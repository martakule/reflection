<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3b5810" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link
      rel="icon"
      href="./assets/icon.png"
      type="image/png"
      sizes="512x512"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Reflection</title>
  </head>
  <body>
    <div class="wrapper">
      <button type="button" class="button" id="intro">
        Mindful with compassion
      </button>
      <div class="controls" id="controls"></div>
      <div id="app" class="app hide"></div>
      <div class="modal" id="info"></div>
    </div>
    <script type="module" src="./scripts/app.js"></script>
    <script type="module" src="./scripts/theme.js"></script>
    <script>
      const dev =
        location.hostname === "localhost" || location.hostname === "127.0.0.1";
      if (
        "serviceWorker" in navigator &&
        location.protocol.startsWith("http") &&
        !dev
      ) {
        navigator.serviceWorker.register("./sw.js", { updateViaCache: "none" });
      }
    </script>
  </body>
</html>
